[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ghost-shared"
version = "0.1.0"
description = "Shared contract code for GhostBrowser OS: page_key, bank IO, DOM hash, ClickHouse storage."
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "clickhouse-connect>=0.7",
]

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools]
packages = ["ghost_shared"]

[tool.pytest.ini_options]
testpaths = ["tests"]
