[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ghost-shared"
version = "0.1.0"
description = "GhostBrowser OS shared Python lib: page_key() and bank (de)serialization (CONTRACTS.md §3-4). Single implementation - all Python apps import this."
requires-python = ">=3.10"
dependencies = ["numpy>=1.26"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["ghost_shared"]

[tool.pytest.ini_options]
testpaths = ["tests"]
