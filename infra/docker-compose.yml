# AgentInception — ClickHouse. CONTRACTS.md §5/§9.
# Brought up idempotently by scripts/ch_init.sh.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: agentinception-clickhouse
    ports:
      - "8123:8123" # HTTP interface (CLICKHOUSE_URL)
      - "9000:9000" # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: agentinception
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8123/ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  clickhouse-data:
    name: agentinception-clickhouse-data
