<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Demo Popup Fixture</title>
  <style>#cookie-modal { position: fixed; inset: 0; }</style>
</head>
<body>
  <div id="content"><h1>Welcome to the demo store</h1><p>Browse our products.</p></div>
  <div id="cookie-modal" role="dialog">
    <p>We use cookies to improve your experience.</p>
    <button id="accept-cookies">Accept all cookies</button>
    <button id="reject-cookies">Reject</button>
  </div>
</body>
</html>
